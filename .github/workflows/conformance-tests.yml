name: Conformance Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run tests daily at 6 AM UTC to catch any environment issues
    - cron: '0 6 * * *'

jobs:
  conformance-tests:
    name: Python ${{ matrix.python-version }} Conformance
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run version-appropriate conformance tests
      run: |
        # Run tests with version-specific markers
        python -m pytest tests/conformance/ \
          -v --tb=short \
          -m "not min_version or min_version_${{ matrix.python-version }}"
        
    - name: Generate test report
      if: always()
      run: |
        python -m pytest tests/conformance/ \
          -m "not min_version or min_version_${{ matrix.python-version }}" \
          --json-report --json-report-file=test-report.json || true
        
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results-${{ matrix.python-version }}
        path: test-report.json

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: conformance-tests
    if: always()
    
    steps:
    - name: Check test results
      run: |
        echo "Python Language Reference Conformance Tests completed"
        echo "Status: ${{ needs.conformance-tests.result }}"