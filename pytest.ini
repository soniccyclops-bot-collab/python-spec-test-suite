[pytest]
markers =
    min_version: tests that require specific minimum Python version
    min_version_3_0: requires Python 3.0+ (exception chaining)
    min_version_3_5: requires Python 3.5+ (async/await keywords)
    min_version_3_6: requires Python 3.6+ (f-strings, underscores in literals)
    min_version_3_7: requires Python 3.7+ (async/await reserved keywords)
    min_version_3_8: requires Python 3.8+ (walrus operator :=)
    min_version_3_9: requires Python 3.9+ (multiple starred assignments)
    min_version_3_10: requires Python 3.10+ (match statements, union types)
    min_version_3_11: requires Python 3.11+ (except groups, task groups)
    min_version_3_12: requires Python 3.12+ (f-string debugging, type params)
    
    # Feature-based markers for finer control
    feature_fstrings: tests f-string features (3.6+)
    feature_walrus: tests walrus operator (3.8+) 
    feature_match: tests match statements (3.10+)
    feature_union_types: tests X | Y syntax (3.10+)
    feature_async: tests async/await features (3.5+)
    
    # Implementation-specific markers
    cpython_only: tests specific to CPython implementation
    pypy_skip: skip on PyPy due to known differences
    
addopts = 
    -v
    --strict-markers
    --tb=short